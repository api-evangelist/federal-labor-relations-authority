aid: federal-labor-relations-authority
name: Federal Labor Relations Authority
description: >-
  The Federal Labor Relations Authority oversees the Federal service
  labor-management relations program. It administers the law that protects the
  right of employees of the Federal Government to organize, bargain
  collectively, and participate through labor organizations of their own
  choosing in decisions affecting them.
